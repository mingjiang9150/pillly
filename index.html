<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pillly</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Pillly">
<meta name="theme-color" content="#F5F3EF">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://fszveofufddccfcndjiw.supabase.co">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F5F3EF; --card:#FDFCFB; --card2:#EEEBE6;
  --line:#E6E2DB; --line2:#D5D0C8; --muted:#A09890;
  --text:#1E1A16; --text2:#4C453D;
  --accent:#4A7C6F; --accent-bg:#EAF3F0; --accent-light:#7BB5A8;
  --warn:#C8813A; --warn-bg:#FDF0E4;
  --danger:#B85450; --danger-bg:#FAEDEC;
  --r:16px; --shadow:0 1px 2px rgba(30,20,10,0.04),0 4px 20px rgba(30,20,10,0.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{
  font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);
  max-width:430px;margin:0 auto;min-height:100vh;
  padding-bottom:calc(90px + env(safe-area-inset-bottom));
  padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);
}
::-webkit-scrollbar{width:0;}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
.loading-logo{font-size:32px;font-weight:700;color:var(--accent);letter-spacing:-1px;margin-bottom:16px;}
.loading-dot{width:8px;height:8px;background:var(--accent-light);border-radius:50%;animation:pulse 1.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1.1)}}

/* LOGIN SCREEN (no register) */
.login-screen{
  position:fixed;inset:0;background:var(--bg);z-index:998;
  display:flex;flex-direction:column;align-items:center;
  padding:calc(env(safe-area-inset-top) + 60px) 28px 40px;
  overflow-y:auto;
}
.login-logo{font-size:36px;font-weight:700;color:var(--accent);letter-spacing:-1px;margin-bottom:4px;}
.login-logo::after{content:'';display:inline-block;width:8px;height:8px;background:var(--accent-light);border-radius:50%;margin-left:2px;vertical-align:middle;margin-bottom:5px;}
.login-sub{font-size:14px;color:var(--muted);margin-bottom:36px;}
.login-card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:24px;width:100%;max-width:360px;box-shadow:var(--shadow);}
.login-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:20px;text-align:center;}
.login-link{font-size:13px;color:var(--accent);text-align:center;margin-top:10px;cursor:pointer;font-weight:600;}

/* PROFILE PAGE */
.profile-header{
  background:var(--card);border:1px solid var(--line);border-radius:20px;
  padding:20px;margin-bottom:16px;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:14px;
}
.profile-avatar{
  width:52px;height:52px;border-radius:16px;flex-shrink:0;
  background:var(--accent-bg);display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:700;color:var(--accent);
}
.profile-name{font-size:17px;font-weight:700;color:var(--text);}
.profile-email{font-size:12px;color:var(--muted);margin-top:2px;}
.section-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.8px;text-transform:uppercase;margin:20px 0 8px;}
.action-list{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);}
.action-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:background 0.15s;}
.action-row:last-child{border-bottom:none;}
.action-row:active{background:var(--card2);}
.action-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.action-label{flex:1;font-size:15px;font-weight:500;color:var(--text);}
.action-arrow{color:var(--line2);font-size:18px;}
.action-label.danger{color:var(--danger);}

.status{
  display:flex;justify-content:flex-end;align-items:center;
  padding:calc(14px + env(safe-area-inset-top)) 24px 0;
  font-size:12px;font-weight:600;color:var(--text2);
  min-height:calc(44px + env(safe-area-inset-top));
}
.pillly-wordmark{font-size:15px;font-weight:700;letter-spacing:-0.5px;color:var(--accent);user-select:none;}
.pillly-wordmark::after{content:'';display:inline-block;width:5px;height:5px;background:var(--accent-light);border-radius:50%;margin-left:1px;vertical-align:middle;margin-bottom:2px;opacity:0.8;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-light);display:inline-block;margin-left:4px;animation:pulse 1.5s infinite;}

/* NAV */
.nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;background:rgba(247,245,242,0.92);
  backdrop-filter:blur(20px);border-top:1px solid var(--line);
  display:flex;padding:10px 0 0;z-index:100;
  padding-bottom:max(26px,env(safe-area-inset-bottom));
}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.nav-icon{width:26px;height:26px;display:flex;align-items:center;justify-content:center;}
.nav-label{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:0.4px;}
.nav-item.active .nav-label{color:var(--accent);}
.nav-item .nav-icon svg{stroke:var(--muted);transition:stroke 0.2s;}
.nav-item.active .nav-icon svg{stroke:var(--accent);}

/* PAGES */
.page{display:none;padding:0 20px;}
.page.active{display:block;}
.page-hd{padding:18px 0 16px;display:flex;align-items:flex-end;justify-content:space-between;}
.page-title{font-family:'DM Sans',sans-serif;font-size:34px;font-weight:700;color:var(--text);line-height:1;letter-spacing:-1px;}
.page-sub{font-size:12px;color:var(--muted);padding-bottom:5px;}

/* PILL AVATAR */
.med-pill{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;letter-spacing:0.8px;flex-shrink:0;font-family:'DM Sans',sans-serif;border-radius:12px;}

/* PROGRESS CARD */
.prog-card{background:var(--card);border-radius:20px;padding:20px 22px;display:flex;align-items:center;gap:18px;margin-bottom:18px;box-shadow:var(--shadow);border:1px solid var(--line);}
.arc-wrap{position:relative;width:66px;height:66px;flex-shrink:0;}
.arc-wrap svg{transform:rotate(-90deg);}
.arc-bg{fill:none;stroke:var(--line2);stroke-width:5;}
.arc-fill{fill:none;stroke:var(--accent);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 0.6s cubic-bezier(.4,0,.2,1);}
.arc-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--accent);}
.prog-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:3px;}
.prog-sub{font-size:13px;color:var(--muted);line-height:1.5;}

/* MED CARD */
.med-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:13px 16px;display:flex;align-items:center;gap:13px;margin-bottom:8px;cursor:pointer;transition:opacity 0.2s;user-select:none;box-shadow:var(--shadow);}
.med-card:active{opacity:0.7;}
.med-card.taken{opacity:0.38;box-shadow:none;border-color:transparent;}
.med-info{flex:1;min-width:0;}
.med-name{font-size:15px;font-weight:600;color:var(--text);margin-bottom:2px;}
.med-time{font-size:12px;color:var(--muted);}
.check-ring{width:26px;height:26px;border-radius:50%;border:2px solid var(--line2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;background:transparent;}
.med-card.taken .check-ring{background:var(--accent);border-color:var(--accent);}
.check-icon{opacity:0;transition:opacity 0.2s;}
.med-card.taken .check-icon{opacity:1;}
.time-sep{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.8px;text-transform:uppercase;margin:16px 0 8px;}
.empty-state{text-align:center;padding:64px 24px;color:var(--muted);}
.empty-state p{font-size:14px;line-height:1.8;}

/* CALENDAR */
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-month{font-size:15px;font-weight:600;color:var(--text);}
.cal-btn{background:var(--card);border:1px solid var(--line2);color:var(--muted);border-radius:8px;padding:5px 13px;cursor:pointer;font-size:17px;line-height:1;}
.cal-card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px 14px 14px;box-shadow:var(--shadow);}
.cal-wdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:10px;}
.cal-wday{text-align:center;font-size:10px;font-weight:600;color:var(--muted);letter-spacing:0.6px;}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;transition:background 0.15s;position:relative;}
.cal-day.empty{cursor:default;}
.cal-day.future{cursor:default;opacity:0.28;}
.cal-day:not(.empty):not(.future):hover{background:var(--card2);}
.cal-day.sel{background:var(--card2);outline:1px solid var(--line2);}
.day-pie-wrap{position:relative;width:28px;height:28px;display:flex;align-items:center;justify-content:center;}
.day-pie-wrap svg{position:absolute;inset:0;}
.day-num{font-size:12px;font-weight:500;color:var(--text);line-height:1;position:relative;z-index:1;}

/* DETAIL */
.detail-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-top:12px;box-shadow:var(--shadow);animation:slideIn 0.2s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.detail-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.detail-date{font-size:14px;font-weight:600;color:var(--text);}
.detail-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px;}
.detail-row:last-child{border-bottom:none;}
.detail-bar{width:3px;height:28px;border-radius:2px;flex-shrink:0;}
.detail-name{flex:1;font-weight:500;color:var(--text);}
.detail-time{font-size:12px;color:var(--muted);margin-right:4px;}
.badge{font-size:11px;font-weight:700;letter-spacing:0.4px;padding:3px 9px;border-radius:20px;}
.badge.ok{background:var(--accent-bg);color:var(--accent);}
.badge.no{background:var(--danger-bg);color:var(--danger);}
.badge.na{background:var(--card2);color:var(--muted);}

/* MEDS LIST */
.add-btn{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:21px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(61,122,110,0.35);}
.med-list{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);}
.med-list-row{display:flex;align-items:center;gap:13px;padding:14px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:background 0.15s;}
.med-list-row:last-child{border-bottom:none;}
.med-list-row:active{background:var(--card2);}
.ml-info{flex:1;}
.ml-name{font-size:15px;font-weight:600;color:var(--text);margin-bottom:2px;}
.ml-desc{font-size:12px;color:var(--muted);}
.ml-arrow{color:var(--line2);font-size:18px;}

/* FILTER PILLS */
.filter-pill{display:flex;align-items:center;gap:6px;padding:6px 12px 6px 8px;border-radius:20px;border:1.5px solid var(--line2);background:var(--card);cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);transition:all 0.15s;white-space:nowrap;}
.filter-pill:active{opacity:0.7;}
.filter-pill .fp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.filter-pill.active{border-color:var(--color,var(--accent));color:var(--color,var(--accent));background:var(--color-bg,var(--accent-bg));}
.filter-pill.all{padding:6px 14px;}
.filter-pill.all.active{border-color:var(--text2);color:var(--text2);background:var(--card2);}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(20,16,12,0.4);backdrop-filter:blur(4px);z-index:200;align-items:flex-end;}
.overlay.open{display:flex;}
.sheet{background:var(--card);border-radius:24px 24px 0 0;border-top:1px solid var(--line);padding:16px 20px 48px;width:100%;max-width:430px;margin:0 auto;animation:sheetUp 0.28s cubic-bezier(.4,0,.2,1);max-height:92vh;overflow-y:auto;}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:32px;height:3px;background:var(--line2);border-radius:2px;margin:0 auto 20px;}
.sheet-title{font-size:17px;font-weight:700;text-align:center;margin-bottom:24px;color:var(--text);}
.field{margin-bottom:16px;}
.field-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.7px;text-transform:uppercase;margin-bottom:8px;display:block;}
.field-input{width:100%;padding:12px 14px;background:var(--bg);border:1px solid var(--line2);border-radius:10px;font-size:15px;font-family:inherit;color:var(--text);outline:none;transition:border-color 0.2s;}
.field-input:focus{border-color:var(--accent);}
.field-input::placeholder{color:var(--line2);}
.swatch-row{display:flex;gap:8px;flex-wrap:wrap;}
.swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all 0.15s;opacity:0.85;}
.swatch.sel{border-color:var(--text);transform:scale(1.15);opacity:1;}
.time-list{display:flex;flex-direction:column;gap:8px;}
.time-row{display:flex;align-items:center;gap:10px;}
.time-input{flex:1;padding:11px 14px;background:var(--bg);border:1px solid var(--line2);border-radius:10px;font-size:15px;font-family:inherit;color:var(--text);outline:none;}
.time-input:focus{border-color:var(--accent);}
.del-time{width:28px;height:28px;border-radius:50%;background:var(--danger-bg);color:var(--danger);border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.add-time-btn{width:100%;padding:11px;background:none;border:1px dashed var(--line2);border-radius:10px;color:var(--muted);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:8px;}
.btn{width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;border:none;margin-top:8px;}
.btn-accent{background:var(--accent);color:#fff;}
.btn-danger{background:var(--danger-bg);color:var(--danger);}

/* SCHEDULE SELECTOR */
.schedule-options{display:flex;flex-direction:column;gap:6px;}
.schedule-option{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;border:1.5px solid var(--line2);background:var(--bg);cursor:pointer;transition:all 0.15s;}
.schedule-option.sel{border-color:var(--accent);background:var(--accent-bg);}
.schedule-radio{width:16px;height:16px;border-radius:50%;border:2px solid var(--line2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.schedule-option.sel .schedule-radio{border-color:var(--accent);background:var(--accent);}
.schedule-option.sel .schedule-radio::after{content:'';width:5px;height:5px;border-radius:50%;background:#fff;display:block;}
.schedule-option-label{font-size:14px;font-weight:500;color:var(--text);}
.schedule-option.sel .schedule-option-label{color:var(--accent);}
.schedule-extra{margin-top:10px;padding:12px 14px;background:var(--bg);border:1px solid var(--line2);border-radius:10px;display:flex;flex-direction:column;gap:10px;}
.schedule-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);}
.schedule-row input[type=number]{width:56px;padding:6px 8px;border-radius:8px;border:1.5px solid var(--line2);background:var(--card);font-size:14px;font-weight:600;font-family:inherit;color:var(--text);text-align:center;outline:none;}
.schedule-row input[type=number]:focus{border-color:var(--accent);}
.schedule-row input[type=date]{flex:1;padding:6px 10px;border-radius:8px;border:1.5px solid var(--line2);background:var(--card);font-size:13px;font-family:inherit;color:var(--text);outline:none;}
.schedule-row input[type=date]:focus{border-color:var(--accent);}
.weekday-row{display:flex;gap:6px;flex-wrap:wrap;}
.wd-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--line2);background:var(--card);font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.wd-btn.sel{border-color:var(--accent);background:var(--accent);color:#fff;}

/* RETRO CHECK */
.retro-btn{font-size:11px;font-weight:700;letter-spacing:0.3px;padding:3px 9px;border-radius:20px;border:1.5px solid var(--warn);background:var(--warn-bg);color:var(--warn);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.15s;}
.retro-btn:active{opacity:0.7;}
.retro-overlay{display:none;position:fixed;inset:0;background:rgba(20,16,12,0.45);backdrop-filter:blur(4px);z-index:300;align-items:center;justify-content:center;padding:0 32px;}
.retro-overlay.open{display:flex;}
.retro-modal{background:var(--card);border-radius:20px;border:1px solid var(--line);padding:24px 22px 20px;width:100%;max-width:320px;box-shadow:var(--shadow);animation:slideIn 0.2s ease;text-align:center;}
.retro-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px;}
.retro-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px;}
.retro-actions{display:flex;gap:10px;}
.retro-cancel{flex:1;padding:11px;border-radius:12px;border:1.5px solid var(--line2);background:none;font-size:14px;font-weight:600;font-family:inherit;color:var(--text2);cursor:pointer;}
.retro-confirm{flex:1;padding:11px;border-radius:12px;border:none;background:var(--warn);font-size:14px;font-weight:700;font-family:inherit;color:#fff;cursor:pointer;}

/* TOAST */
.toast{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-16px);background:var(--text);color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;z-index:400;opacity:0;transition:all 0.3s;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- LOGIN (NO REGISTER) -->
<div id="loginScreen" style="display:none" class="login-screen">
  <div class="login-logo">Pillly</div>
  <div class="login-sub">你的每日服药助手</div>
  <div class="login-card">
    <div class="login-title">登录</div>
    <div class="field">
      <label class="field-label">邮箱</label>
      <input class="field-input" id="loginEmail" placeholder="你的邮箱" type="email" autocomplete="email">
    </div>
    <div class="field">
      <label class="field-label">密码</label>
      <input class="field-input" id="loginPassword" placeholder="你的密码" type="password" autocomplete="current-password">
    </div>
    <button class="btn btn-accent" id="loginBtn" onclick="doPasswordLogin()">登录</button>
    <div class="login-link" onclick="doForgotPassword()">忘记密码？发送重置邮件</div>
  </div>
</div>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">Pillly</div>
  <div class="loading-dot"></div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none">

<div class="status">
  <span id="syncIndicator"></span>
  <span class="pillly-wordmark">Pillly</span>
</div>

<!-- TODAY -->
<div class="page active" id="page-today">
  <div class="page-hd"><div>
    <div class="page-title">今天</div>
    <div class="page-sub" id="todaySub"></div>
  </div></div>
  <div class="prog-card">
    <div class="arc-wrap">
      <svg width="66" height="66" viewBox="0 0 66 66">
        <circle class="arc-bg" cx="33" cy="33" r="27"/>
        <circle class="arc-fill" id="arcFill" cx="33" cy="33" r="27" stroke-dasharray="169.6" stroke-dashoffset="169.6"/>
      </svg>
      <div class="arc-label" id="arcLabel">—</div>
    </div>
    <div>
      <div class="prog-title" id="progTitle">今日服药</div>
      <div class="prog-sub" id="progSub">暂无药物记录</div>
    </div>
  </div>
  <div id="todayList"></div>
</div>

<!-- CALENDAR -->
<div class="page" id="page-calendar">

// ─── STATE ────────────────────────────────────────────────────────────────────
const PALETTE_DISPLAY=['#7DBFB0','#7BAFD4','#D4956A','#9E8DC4','#C47878','#6DB5A8','#C9A84C','#7BA8C8','#B87AAE','#8DB87A'];
const PALETTE_ACTUAL =['#3D7A6E','#3A6E96','#8C5A32','#5E4E8C','#8C3E3E','#2E7A6E','#7A6028','#3A5E82','#7A3E6E','#4E7A3A'];

// ─── UTILS ────────────────────────────────────────────────────────────────────
function getNow(){return new Date();}
function ds(d){return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;}
function getTodayStr(){return ds(getNow());}
function p(n){return String(n).padStart(2,'0');}
function initials(name){
  if(!name)return '?';
  const w=name.trim().split(/[\s\-·]+/);
  return w.length>=2?(w[0][0]+(w[1][0]||'')).toUpperCase():name.slice(0,2).toUpperCase();
}
function pillHtml(med,sz=44){
  const r=Math.round(sz*.27);
  return `<div class="med-pill" style="width:${sz}px;height:${sz}px;border-radius:${r}px;background:${med.color}1E;color:${med.color};font-size:${sz<40?10:11}px;border:1.5px solid ${med.color}35;letter-spacing:0.5px">${initials(med.name)}</div>`;
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  if(_toastT)clearTimeout(_toastT);
  _toastT=setTimeout(()=>t.classList.remove('show'),2200);
}
function showSync(){document.getElementById('syncIndicator').innerHTML='<span class="sync-dot"></span>';}
function hideSync(){document.getElementById('syncIndicator').innerHTML='';}
function addDays(d,days){
  const x=new Date(d);
  x.setDate(x.getDate()+days);
  return x;
}
function parseLocalDateOnly(dateStr){
  const m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(dateStr||'');
  if(!m) return null;
  return new Date(Number(m[1]),Number(m[2])-1,Number(m[3]));
}
function countLifetimeTaken(medId){
  let total=0;
  const prefix=`${medId}_`;
  Object.values(records||{}).forEach(dayRec=>{
    if(!dayRec||typeof dayRec!=='object') return;
    Object.entries(dayRec).forEach(([k,v])=>{
      if(v===true && k.startsWith(prefix)) total++;
    });
  });
  return total;
}
function countCourseTakenDaysInCurrentCycle(med){
  const s=med?.schedule||{};
  if(s.type!=='course' || !s.startDate) return null;
  if(s.onDays===undefined||s.onDays===null||s.offDays===undefined||s.offDays===null) return null;
  const onDays=Math.floor(Number(s.onDays));
  const offDays=Math.floor(Number(s.offDays));
  if(!Number.isFinite(onDays)||!Number.isFinite(offDays)||onDays<=0||offDays<=0) return null;
  const cycleLen=onDays+offDays;
  if(!cycleLen) return null;

  const startLocal=parseLocalDateOnly(s.startDate);
  if(!startLocal||Number.isNaN(startLocal.getTime())) return null;
  const todayLocal=parseLocalDateOnly(getTodayStr());
  if(!todayLocal||Number.isNaN(todayLocal.getTime())) return null;
  const diffDays=Math.floor((todayLocal-startLocal)/(1000*60*60*24));
  if(diffDays<0) return 0;

  const cycleIndex=Math.floor(diffDays/cycleLen);
  const cycleStart=addDays(startLocal,cycleIndex*cycleLen);
  let takenDays=0;
  const prefix=`${med.id}_`;
  for(let i=0;i<cycleLen;i++){
    const dstr=ds(addDays(cycleStart,i));
    const dayRec=records[dstr]||{};
    const hadTaken=Object.entries(dayRec).some(([k,v])=>v===true&&k.startsWith(prefix));
    if(hadTaken) takenDays++;
  }
  return takenDays;
}
function medCountLabel(med){
  const s=med.schedule||{type:'every_day'};
  if(s.type==='course'){
    const daysInCycle=countCourseTakenDaysInCurrentCycle(med);
    if(daysInCycle!==null) return `本周期已服 ${daysInCycle} 天`;
  }
  return `累计已服 ${countLifetimeTaken(med.id)} 次`;
}

// ─── SCHEDULE HELPERS ─────────────────────────────────────────────────────────
const WD_LABELS=['日','一','二','三','四','五','六'];

function isScheduledForDate(med,dstr){
  const s=med.schedule||{type:'every_day'};
  if(s.type==='every_day') return true;
  if(s.type==='weekly'){
    const dow=new Date(dstr+'T00:00:00').getDay();
    return (s.days||[]).map(Number).includes(dow);
  }
  if(s.type==='interval'){
    if(!s.startDate) return false;
    const every=Math.max(1,Math.floor(s.every||1));
    const diff=Math.round((new Date(dstr+'T00:00:00')-new Date(s.startDate+'T00:00:00'))/(1000*60*60*24));
    return diff>=0 && diff%every===0;
  }
  if(s.type==='course'){
    if(!s.startDate) return false;
    const onDays=Math.max(1,Math.floor(s.onDays||7));
    const offDays=Math.max(1,Math.floor(s.offDays||3));
    const diff=Math.round((new Date(dstr+'T00:00:00')-new Date(s.startDate+'T00:00:00'))/(1000*60*60*24));
    if(diff<0) return false;
    return diff%(onDays+offDays)<onDays;
  }
  return true;
}

function scheduleDesc(med){
  const s=med.schedule||{type:'every_day'};
  const times=med.times||[];
  const tStr=times.length?times.join('、'):'无提醒';
  const freq=times.length?`${times.length} 次 · `:'';
  if(s.type==='every_day') return `每天 ${freq}${tStr}`;
  if(s.type==='weekly'){
    const days=(s.days||[]).map(Number).filter(d=>d>=0&&d<=6);
    if(!days.length) return `每周（未选日期）· ${tStr}`;
    const sorted=days.sort((a,b)=>{const av=a===0?7:a,bv=b===0?7:b;return av-bv;});
    return `每周${sorted.map(d=>WD_LABELS[d]).join('')} · ${tStr}`;
  }
  if(s.type==='interval') return `每 ${Math.max(1,s.every||2)} 天 · ${tStr}`;
  if(s.type==='course') return `服${Math.max(1,s.onDays||7)}天停${Math.max(1,s.offDays||3)}天 · ${tStr}`;
  return `每天 ${freq}${tStr}`;
}

// ─── SCHEDULE UI ──────────────────────────────────────────────────────────────
let selSchedule={type:'every_day'};
function pickSchedule(type,el){
  document.querySelectorAll('.schedule-option').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
  const next={type};
  if(type==='weekly') next.days=selSchedule.days||[1];
  if(type==='interval'){next.every=selSchedule.every||2;next.startDate=selSchedule.startDate||getTodayStr();}
  if(type==='course'){next.onDays=selSchedule.onDays||7;next.offDays=selSchedule.offDays||3;next.startDate=selSchedule.startDate||getTodayStr();}
  selSchedule=next;
  renderScheduleExtra();
}
function renderScheduleExtra(){
  const extra=document.getElementById('scheduleExtra');
  const type=selSchedule.type;
  if(type==='every_day'){extra.style.display='none';extra.innerHTML='';return;}
  extra.style.display='block';
  const tv=getTodayStr();
  if(type==='weekly'){
    const selDays=(selSchedule.days||[1]).map(Number);
    extra.innerHTML=`<div class="schedule-extra"><div class="weekday-row">${[1,2,3,4,5,6,0].map(d=>`<div class="wd-btn${selDays.includes(d)?' sel':''}" onclick="toggleWeekday(${d},this)">${WD_LABELS[d]}</div>`).join('')}</div></div>`;
  } else if(type==='interval'){
    extra.innerHTML=`<div class="schedule-extra"><div class="schedule-row">每隔 <input type="number" min="1" max="30" value="${selSchedule.every||2}" oninput="selSchedule.every=Math.max(1,+this.value||1)"> 天服用一次</div><div class="schedule-row">开始日期 <input type="date" value="${selSchedule.startDate||tv}" onchange="selSchedule.startDate=this.value"></div></div>`;
  } else if(type==='course'){
    extra.innerHTML=`<div class="schedule-extra"><div class="schedule-row">服 <input type="number" min="1" max="90" value="${selSchedule.onDays||7}" oninput="selSchedule.onDays=Math.max(1,+this.value||1)"> 天，停 <input type="number" min="1" max="90" value="${selSchedule.offDays||3}" oninput="selSchedule.offDays=Math.max(1,+this.value||1)"> 天</div><div class="schedule-row">开始日期 <input type="date" value="${selSchedule.startDate||tv}" onchange="selSchedule.startDate=this.value"></div></div>`;
  }
}
function toggleWeekday(d,el){
  if(!selSchedule.days||!Array.isArray(selSchedule.days)) selSchedule.days=[d];
  const days=selSchedule.days.map(Number);
  const idx=days.indexOf(d);
  if(idx===-1){days.push(d);el.classList.add('sel');}
  else if(days.length>1){days.splice(idx,1);el.classList.remove('sel');}
  selSchedule.days=days;
}
function initScheduleUI(schedule){
  const s=schedule||{type:'every_day'};
  selSchedule={...s};
  document.querySelectorAll('.schedule-option').forEach(o=>o.classList.toggle('sel',o.dataset.type===s.type));
  renderScheduleExtra();
}
function readSchedule(){
  const type=selSchedule.type;
  if(type==='every_day') return {type};
  if(type==='weekly') return {type,days:(selSchedule.days||[1]).map(Number)};
  if(type==='interval') return {type,every:Math.max(1,Math.floor(selSchedule.every||2)),startDate:selSchedule.startDate||getTodayStr()};
  if(type==='course') return {type,onDays:Math.max(1,Math.floor(selSchedule.onDays||7)),offDays:Math.max(1,Math.floor(selSchedule.offDays||3)),startDate:selSchedule.startDate||getTodayStr()};
  return {type:'every_day'};
}

async function syncRecord(medId,time,date,taken){

  showSync();
  try{
    await sb.from('medication_records').upsert(
      {user_id:currentUser.id,date,med_id:medId,time,taken},
      {onConflict:'user_id,date,med_id,time'}
    );
  }finally{ hideSync(); }
}
async function syncMed(med,isDelete=false){
  if(!currentUser) return;
  showSync();
  try{
    if(isDelete){
      await sb.from('medications').delete().eq('id',med.id).eq('user_id',currentUser.id);
    } else {
      await sb.from('medications').upsert({...med,user_id:currentUser.id},{onConflict:'id,user_id'});
    }
  }finally{ hideSync(); }
}

// ─── TODAY ────────────────────────────────────────────────────────────────────
function renderToday(){
  const now=getNow(), todayStr=getTodayStr();
  const days=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  document.getElementById('todaySub').textContent=`${now.getMonth()+1}月${now.getDate()}日 · ${days[now.getDay()]}`;
  const list=document.getElementById('todayList'); list.innerHTML='';
  const doses=[], noTimeMeds=[];
  meds.forEach(m=>{
    if(!isScheduledForDate(m,todayStr))return;
    if(!m.times||!m.times.length){ noTimeMeds.push(m); return; }
    (m.times).forEach(t=>doses.push({m,t}));
  });
  if(!doses.length&&!noTimeMeds.length){
    const hasMeds=meds.length>0;
    list.innerHTML=`<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="color:var(--line2);margin-bottom:16px"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0016.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 002 8.5c0 2.3 1.5 4.05 3 5.5l7 7 7-7z"/></svg><p>${hasMeds?'今天不需要服药':'还没有添加药物<br>前往「药物」页面开始添加'}</p></div>`;
    updateArc(0,0);return;
  }
  const rec=records[todayStr]||{}; let taken=0;
  const byTime={}; doses.forEach(({m,t})=>{(byTime[t]=byTime[t]||[]).push(m);});
  const countLabelCache={};
  const timeKeys=Object.keys(byTime).sort();
  timeKeys.forEach(time=>{
    const ms=[...byTime[time]].sort((a,b)=>{
      const ak=!!rec[`${a.id}_${time}`],bk=!!rec[`${b.id}_${time}`];
      return ak===bk?0:ak?1:-1;
    });
    const sep=document.createElement('div');sep.className='time-sep';sep.textContent=time;list.appendChild(sep);
    ms.forEach(med=>{
      const key=`${med.id}_${time}`,isTaken=!!rec[key];if(isTaken)taken++;
      if(!countLabelCache[med.id]) countLabelCache[med.id]=medCountLabel(med);
      const card=document.createElement('div');card.className='med-card'+(isTaken?' taken':'');
      card.innerHTML=`${pillHtml(med)}<div class="med-info"><div class="med-name">${med.name}</div><div class="med-time">${time}</div><div class="med-time" style="font-size:11px">${countLabelCache[med.id]}</div></div><div class="check-ring"><svg class="check-icon" width="12" height="9" viewBox="0 0 12 9" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,4.5 4.5,8 11,1"/></svg></div>`;
      card.addEventListener('click',()=>toggleDose(med.id,time,key,todayStr));
      list.appendChild(card);
    });
  });
  updateArc(taken,doses.length);

  // Meds with no reminder time shown at bottom
  if(noTimeMeds.length){
    const sep=document.createElement('div');sep.className='time-sep';sep.textContent='无提醒时间';list.appendChild(sep);
    noTimeMeds.forEach(med=>{
      if(!countLabelCache[med.id]) countLabelCache[med.id]=medCountLabel(med);
      const card=document.createElement('div');card.className='med-card';
      card.innerHTML=`${pillHtml(med)}<div class="med-info"><div class="med-name">${med.name}</div><div class="med-time" style="color:var(--muted)">按需服用</div><div class="med-time" style="font-size:11px">${countLabelCache[med.id]}</div></div>`;
      list.appendChild(card);
    });
  }
}

async function toggleDose(medId,time,key,todayStr){
  if(!records[todayStr])records[todayStr]={};
  const newTaken=!records[todayStr][key];
  records[todayStr][key]=newTaken;
  if(newTaken)toast('已记录服药 ✓');
  renderToday();
  try{ await syncRecord(medId,time,todayStr,newTaken); }
  catch(e){ toast('记录已保存，同步失败'); }
}

function updateArc(taken,total){
  const circ=169.6,pct=total?Math.round(taken/total*100):0;
  document.getElementById('arcFill').style.strokeDashoffset=circ-circ*pct/100;
  document.getElementById('arcLabel').textContent=total?pct+'%':'—';
  document.getElementById('progTitle').textContent=taken===total&&total>0?'全部完成 ✓':'今日服药';
  document.getElementById('progSub').textContent=total?`已服 ${taken} 次，共 ${total} 次`:'暂无药物记录';
}

function renderCal(){
  const todayStr=getTodayStr();
  calY=calY||getNow().getFullYear();calM=calM!==undefined?calM:getNow().getMonth();
  document.getElementById('calLabel').textContent=`${calY} 年 ${calM+1} 月`;
  const firstDay=new Date(calY,calM,1).getDay(),days=new Date(calY,calM+1,0).getDate();
  const c=document.getElementById('calDays');c.innerHTML='';

  // Get active med color for themed display
  const activeMed=filterMedId?meds.find(m=>m.id===filterMedId):null;
  const themeColor=activeMed?activeMed.color:'var(--accent)';
  const themeBg=activeMed?activeMed.color+'22':'var(--accent-bg)';
  const themeLight=activeMed?activeMed.color+'99':'var(--accent-light)';

  for(let i=0;i<firstDay;i++){const e=document.createElement('div');e.className='cal-day empty';c.appendChild(e);}
  for(let d=1;d<=days;d++){
    const dstr=`${calY}-${p(calM+1)}-${p(d)}`,isToday=dstr===todayStr,isFuture=dstr>todayStr;
    const cell=document.createElement('div');
    cell.className='cal-day'+(isFuture?' future':'')+(dstr===selDay?' sel':'');
    const rec=records[dstr]||{};
    const activeMeds=filterMedId?meds.filter(m=>m.id===filterMedId):meds;
    const allDoses=[]; activeMeds.forEach(m=>{
      if(!isScheduledForDate(m,dstr))return;
      (m.times||[]).forEach(t=>allDoses.push(`${m.id}_${t}`));
    });
    const total=allDoses.length,taken=!isFuture?allDoses.filter(k=>rec[k]).length:0;
    const pct=total>0?taken/total:0,isComplete=total>0&&taken===total;
    const R=13,cx=14,cy=14;
    let bgFill='none',bgStroke='var(--line2)',bgStrokeW=1.5,piePath='',numColor='var(--text)',numWeight=500;
    if(!isFuture&&total>0){
      if(isComplete){bgFill=themeColor;bgStroke='none';bgStrokeW=0;numColor='#fff';numWeight=700;}
      else if(taken>0){
        bgFill=themeBg;bgStroke=themeLight;bgStrokeW=1;
        const angle=pct*2*Math.PI,x1=cx+R*Math.sin(0),y1=cy-R*Math.cos(0),x2=cx+R*Math.sin(angle),y2=cy-R*Math.cos(angle),largeArc=angle>Math.PI?1:0;
        piePath=`<path d="M${cx},${cy} L${x1},${y1} A${R},${R} 0 ${largeArc},1 ${x2},${y2} Z" fill="${themeLight}" opacity="0.85"/>`;
      }
    }
    if(isToday&&!isComplete){bgStroke=themeColor;bgStrokeW=2;numColor=themeColor;numWeight=700;}
    else if(isToday&&isComplete){numWeight=700;}
    const svgBg=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="${bgFill}" stroke="${bgStroke}" stroke-width="${bgStrokeW}"/>`;
    cell.innerHTML=`<div class="day-pie-wrap"><svg width="28" height="28" viewBox="0 0 28 28" style="position:absolute;inset:0">${svgBg}${piePath}</svg><span class="day-num" style="color:${numColor};font-weight:${numWeight};position:relative;z-index:1">${d}</span></div>`;
    cell.addEventListener('click',()=>{
      if(isFuture)return;
      if(selDay===dstr){selDay=null;document.getElementById('calDetail').innerHTML='';}
      else{selDay=dstr;showDetail(dstr);}
      renderCal();
    });
    c.appendChild(cell);
  }
}

function showDetail(dstr){
  const todayStr=getTodayStr();
  const rec=records[dstr]||{},d=new Date(dstr+'T00:00:00');
  const wdays=['日','一','二','三','四','五','六'];
  const label=`${d.getMonth()+1} 月 ${d.getDate()} 日（周${wdays[d.getDay()]}）`;
  const isFuture=dstr>todayStr;
  const activeMeds=filterMedId?meds.filter(m=>m.id===filterMedId):meds;
  const doses=[]; activeMeds.forEach(m=>{
    if(!isScheduledForDate(m,dstr))return;
    if(!m.times||!m.times.length){
      // No-time meds shown without a time key
      doses.push({m,t:null});
      return;
    }
    (m.times).forEach(t=>doses.push({m,t}));
  });
  doses.sort((a,b)=>{
    if(a.t===null&&b.t!==null) return 1;
    if(a.t!==null&&b.t===null) return -1;
    if(a.t===null&&b.t===null) return 0;
    const ak=!!rec[`${a.m.id}_${a.t}`],bk=!!rec[`${b.m.id}_${b.t}`];
    if(ak!==bk)return ak?1:-1;return a.t.localeCompare(b.t);
  });
  if(!doses.length){document.getElementById('calDetail').innerHTML='';return;}
  const takenCount=doses.filter(({m,t})=>t!==null&&!!rec[`${m.id}_${t}`]).length;
  const totalWithTime=doses.filter(({t})=>t!==null).length;
  const sc=takenCount===totalWithTime&&totalWithTime>0?'var(--accent)':takenCount===0?'var(--danger)':'var(--warn)';
  const st=totalWithTime===0?'无提醒时间':takenCount===totalWithTime?'全部完成':`${takenCount} / ${totalWithTime}`;
  const rows=doses.map(({m,t})=>{
    if(t===null){
      return `<div class="detail-row"><div class="detail-bar" style="background:${m.color}"></div><div class="detail-name">${m.name}</div><div class="detail-time" style="color:var(--muted)">无提醒</div><div class="badge na">按需</div></div>`;
    }
    const taken=!!rec[`${m.id}_${t}`];
    const isPast=!isFuture&&dstr!==todayStr;
    const bc=isFuture?'na':taken?'ok':'no',bt=isFuture?'待服':taken?'已服':'未服';
    const retroBtn=(!taken&&isPast)
      ?`<button class="retro-btn" data-dstr="${dstr}" data-medid="${m.id}" data-time="${t}" data-medname="${m.name.replace(/"/g,'&quot;')}" onclick="openRetro(this)">补打卡</button>`
      :`<div class="badge ${bc}">${bt}</div>`;
    return `<div class="detail-row"><div class="detail-bar" style="background:${m.color}"></div><div class="detail-name">${m.name}</div><div class="detail-time">${t}</div>${retroBtn}</div>`;
  }).join('');
  document.getElementById('calDetail').innerHTML=`<div class="detail-card"><div class="detail-hd"><div class="detail-date">${label}</div><div style="font-size:12px;font-weight:700;color:${sc}">${st}</div></div>${rows}</div>`;
}

// ─── ICS EXPORT (日历导出) ───────────────────────────────────────────────────
const WD_BYDAY=['SU','MO','TU','WE','TH','FR','SA'];
function icsEscape(s){
  return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/\r?\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;');
}
function icsDtFloat(dateStr,hhmm){
  const [h,m]=(hhmm||'00:00').split(':');
  return dateStr.replace(/-/g,'')+'T'+h+m+'00';
}
function icsNowUtc(){
  const d=new Date();
  return `${d.getUTCFullYear()}${p(d.getUTCMonth()+1)}${p(d.getUTCDate())}T${p(d.getUTCHours())}${p(d.getUTCMinutes())}${p(d.getUTCSeconds())}Z`;
}
function addDaysStr(dateStr,days){
  const d=parseLocalDateOnly(dateStr); if(!d) return dateStr;
  d.setDate(d.getDate()+days);
  return ds(d);
}
function nextDstrMatchingWeekdays(fromDstr,days){
  const from=parseLocalDateOnly(fromDstr); if(!from) return fromDstr;
  for(let i=0;i<7;i++){
    const d=new Date(from); d.setDate(d.getDate()+i);
    if(days.includes(d.getDay())) return ds(d);
  }
  return fromDstr;
}
function nextOccurrenceOnOrAfter(startDateStr,today,every){
  if(startDateStr>=today) return startDateStr;
  const from=parseLocalDateOnly(startDateStr), to=parseLocalDateOnly(today);
  if(!from||!to) return startDateStr;
  const diff=Math.round((to-from)/86400000);
  const offset=Math.ceil(diff/every)*every;
  return addDaysStr(startDateStr,offset);
}

function buildIcsForMeds(sourceMeds){
  const today=getTodayStr();
  const stamp=icsNowUtc();
  const lines=[
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Pillly//Medication Reminders//ZH',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'X-WR-CALNAME:Pillly 服药提醒',
    'X-WR-TIMEZONE:Asia/Shanghai'
  ];
  let count=0;
  (sourceMeds||[]).forEach(med=>{
    const times=(med.times||[]).filter(Boolean);
    if(!times.length) return;
    const s=med.schedule||{type:'every_day'};
    times.forEach(time=>{
      const occurrences=[];
      if(s.type==='every_day'){
        occurrences.push({uid:`${med.id}-${time}-d`,start:today,rrule:'FREQ=DAILY'});
      } else if(s.type==='weekly'){
        const days=(s.days||[]).map(Number).filter(d=>d>=0&&d<=6);
        if(!days.length) return;
        const start=nextDstrMatchingWeekdays(today,days);
        occurrences.push({uid:`${med.id}-${time}-w`,start,rrule:`FREQ=WEEKLY;BYDAY=${days.map(d=>WD_BYDAY[d]).join(',')}`});
      } else if(s.type==='interval'){
        if(!s.startDate) return;
        const every=Math.max(1,Math.floor(s.every||1));
        const start=nextOccurrenceOnOrAfter(s.startDate,today,every);
        occurrences.push({uid:`${med.id}-${time}-i`,start,rrule:`FREQ=DAILY;INTERVAL=${every}`});
      } else if(s.type==='course'){
        if(!s.startDate) return;
        const onDays=Math.max(1,Math.floor(s.onDays||7));
        const offDays=Math.max(1,Math.floor(s.offDays||3));
        const cycle=onDays+offDays;
        for(let k=0;k<onDays;k++){
          const firstDay=addDaysStr(s.startDate,k);
          const start=nextOccurrenceOnOrAfter(firstDay,today,cycle);
          occurrences.push({uid:`${med.id}-${time}-c${k}`,start,rrule:`FREQ=DAILY;INTERVAL=${cycle}`});
        }
      }
      occurrences.forEach(ev=>{
        lines.push(
          'BEGIN:VEVENT',
          `UID:${ev.uid}@pillly`,
          `DTSTAMP:${stamp}`,
          `DTSTART:${icsDtFloat(ev.start,time)}`,
          'DURATION:PT10M',
          `RRULE:${ev.rrule}`,
          `SUMMARY:${icsEscape(med.name)} · 服药提醒`,
          `DESCRIPTION:${icsEscape('服药时间 '+time)}`,
          'BEGIN:VALARM',
          'ACTION:DISPLAY',
          `DESCRIPTION:${icsEscape(med.name||'服药提醒')}`,
          'TRIGGER:PT0M',
          'END:VALARM',
          'END:VEVENT'
        );
        count++;
      });
    });
  });
  lines.push('END:VCALENDAR');
  return {ics:lines.join('\r\n'),count};
}

function exportMedsToIcs(){
  if(!meds||!meds.length){toast('还没有药物可导出');return;}
  const {ics,count}=buildIcsForMeds(meds);
  if(!count){toast('没有带提醒时间的药物');return;}
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='pillly-reminders.ics';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},500);
  toast(`已生成 ${count} 条提醒，点开导入系统日历`);
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
async function loadAndStart(){
  show('loadingScreen');
  showSync();

  if(!currentUser){
    hideSync();
    document.getElementById('loadingScreen').style.display='none';
    showLogin();
    return;
  }

  try{
    const now=getNow();
    const prevY=now.getMonth()===0?now.getFullYear()-1:now.getFullYear();
    const prevM=now.getMonth()===0?11:now.getMonth()-1;
    const fromDate=`${prevY}-${p(prevM+1)}-01`;
    const [medsRes,recsRes]=await Promise.all([
      sb.from('medications').select('*').eq('user_id',currentUser.id),
      sb.from('medication_records').select('*').eq('user_id',currentUser.id).gte('date',fromDate)
    ]);
    const {data:medsData,error:medsErr}=medsRes;
    const {data:recsData,error:recsErr}=recsRes;
    if(medsErr)throw medsErr;
    meds=(medsData||[]).map(m=>({id:m.id,name:m.name,color:m.color,times:m.times,schedule:m.schedule||{type:'every_day'}}));
    if(recsErr)throw recsErr;
    records={};
    (recsData||[]).forEach(r=>{
      if(!records[r.date])records[r.date]={};
      records[r.date][`${r.med_id}_${r.time}`]=r.taken;
    });
  }catch(e){
    console.error('loadAndStart failed',e);
    toast('数据加载失败，请刷新重试');
    hideSync();
    document.getElementById('loadingScreen').style.display='none';
    show('mainApp');
    renderProfile();
    renderToday();
    return;
  }

  hideSync();
  document.getElementById('loadingScreen').style.display='none';
  showApp();
  renderProfile();
  renderToday();
}

(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  currentUser=session?.user||null;
  hide('loadingScreen');
  // Keep UI in sync even if token refreshes / signs out
  sb.auth.onAuthStateChange((evt, nextSession)=>{
    currentUser=nextSession?.user||null;
    if(!currentUser){
      showLogin();
      return;
    }
    // If user just signed in (or session restored), load data once.
    if(evt==='SIGNED_IN' && document.getElementById('mainApp')?.style?.display!=='block'){
      loadAndStart();
      return;
    }
    renderProfile();
  });
  loadAndStart();
})();
</script>
